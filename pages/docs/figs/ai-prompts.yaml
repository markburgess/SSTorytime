# Missing high-value diagrams — deferred. The next visual pass should
# address each of these. Where a TODO marker lives in a Markdown file
# we list the page; where the Markdown is owned by another agent we
# carry the note here instead so we do not edit their page.
pending_visuals:
  - page: docs/Tutorial.md
    marker: inline TODO(visuals) comment above "## The idea"
    want: "N4L syntax legend — a cheat sheet mapping punctuation (-, ::, (rel), @alias, $alias.N, +::, -::) to roles."

  - page: docs/concepts/architecture.md
    marker: "none — file owned by Rigor, no TODO inserted"
    want: "Read-path sequence diagram — N4L query → parser → PostgreSQL → results. Style A recommended."

  - page: docs/pathsolve.md
    marker: inline TODO(visuals) comment in intro
    want: "Before/after path expansion — boundary sets on the left, converged wave-fronts with highlighted winning path on the right."

  - page: docs/searchN4L.md
    marker: inline TODO(visuals) comment under intro
    want: "Worked query example — three-panel walk-through: raw query string → parsed SearchParameters → result orbits on the graph."

