      - Build system: build-system.md
      - Backup, restore, delete: cookbooks/backup-restore-delete.md
      - Testing: testing.md
      - Observability: operations/observability.md
      # TODO (Birch): absorb the 20-line psql cheat sheet from docs/debug.md
      # into Database/Setup.md (or a short Operations runbook), then delete
      # debug.md. Left out of nav here on purpose.
  - Reference:
      - Concept to Code index: code-index.md
      - Database:
          - Schema: Database/Schema.md
