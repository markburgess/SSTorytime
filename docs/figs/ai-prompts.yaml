      visible. All in black and white.

  - id: I13
    file: figs/api_lifecycle.jpg
    style: A
    placement: docs/API.md (inline)
    last_regenerated: 2026-04-20
    alt: "Pen-and-ink schematic: three rectangular blocks labeled VERTEX, EDGE, HUBJOIN flow via straight arrows into a database cylinder on the right; NodePtr coordinate pairs (x1,y1), (x2,y2), (x3,y3) annotate each block."
    prompt: |
      Pen-and-ink technical schematic, white background, thin black
      lines, hand-drawn shading with cross-hatching. Academic journal
      style, 1970s-1980s scientific illustration. Slight paper texture,
      no color except black and white. Composition: three labeled
      rectangular blocks on the left arranged vertically — labeled
      VERTEX, EDGE, HUBJOIN in clean serif caps — each with a small
      coordinate pair notation in the margin reading (x1,y1), (x2,y2),
      (x3,y3). Clean straight arrows flow from each block on the left
      into a tidy database cylinder on the right labeled DATABASE. The
      diagram is a clear schematic: simple shapes, straight lines,
      labeled clearly. Cross-hatching shading on the cylinder. No
      caption or figure number.
    notes: |
      Regenerated from Style B (warm retro "spaghetti" cylinder) to
      Style A (pure schematic) 2026-04-20. The original visually
      overwhelmed the data-structure clarity that the section needs.

