name: Build
on:
  push:
    branches: [main]
    paths:
      - '**.go'
      - '**/Makefile'
      - 'go.mod'
      - 'go.sum'
      - '.github/workflows/build.yml'
  pull_request:
    paths:
      - '**.go'
      - '**/Makefile'
      - 'go.mod'
      - 'go.sum'
      - '.github/workflows/build.yml'

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          check-latest: true
      # Build-only CI. We deliberately avoid `make all` at the repo root:
      # the root Makefile's `all` target depends on `test`, which recurses
      # into `tests/Makefile` and invokes `./run_tests`. That harness
      # requires a running PostgreSQL and — critically — its library and
      # integration tiers print "NOT ok" and keep going rather than
      # exiting non-zero when the DB is unreachable. Running it without
      # a database therefore produces green CI that hides real failures.
      #
      # Until we wire a `services: postgres` block AND verify that the
      # schema (`Configure()`, `CREATE EXTENSION unaccent`, UNLOGGED→
      # LOGGED lifecycle) actually loads before asserting test exit
      # codes, the honest contract is: CI proves the code compiles, not
      # that it runs. See docs/testing.md for the rationale and the
      # local-DB harness instructions.
      - name: Build binaries (no DB-dependent tests)
        run: cd src && make
      - name: go vet
        run: go vet ./...
      # TODO(observability/testing): add a `services: postgres` job that
      #   stands up Postgres 17, runs `contrib/makedb.sh`, loads the
      #   examples corpus, and *then* runs `cd tests && ./run_tests` —
      #   but only after run_tests itself is modified to exit non-zero
      #   on library/integration-tier failures. See docs/testing.md.
