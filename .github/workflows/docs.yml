name: Deploy Documentation

on:
  push:
    branches:
      - main
    paths:
      - 'pages/**'
      - '.github/workflows/docs.yml'
  pull_request:
    paths:
      - 'pages/**'
      - '.github/workflows/docs.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: pages/requirements.txt

      - name: Install dependencies
        run: pip install -r pages/requirements.txt

      - name: Build site
        run: mkdocs build --strict -f pages/mkdocs.yml

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: pages/site

  deploy:
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    env:
      # Opt actions/deploy-pages@v4 into Node 24 early; Node 20
      # support is removed June 2026. Drop this once deploy-pages@v5
      # ships with native Node 24.
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
