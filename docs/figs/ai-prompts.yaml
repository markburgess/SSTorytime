      shading.

  - id: I8
    file: figs/knowledge_tasted.jpg
    style: A
    placement: docs/KnowledgeAndLearning.md (inline)
    alt: "Still life: an open notebook with a slice of fruit beside it, warmly lit — knowledge is tasted, not just remembered."
    prompt: |
      Hand-drawn still life from slightly above: an open notebook, a
