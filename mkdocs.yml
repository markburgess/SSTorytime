site_name: SSTorytime
site_description: Semantic Spacetime Story graph database over PostgreSQL
site_author: Mark Burgess (ChiTek-i)
site_url: https://markburgess.github.io/SSTorytime/
repo_name: markburgess/SSTorytime
repo_url: https://github.com/markburgess/SSTorytime
edit_uri: edit/main/docs/
copyright: Copyright &copy; Mark Burgess / ChiTek-i — an NLnet sponsored project

docs_dir: docs
site_dir: site

exclude_docs: |
  /README.md
  requirements.txt

theme:
  name: material
  language: en
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.indexes
    - navigation.top
    - navigation.footer
    - toc.follow
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy
    - content.code.annotate
    - content.action.edit
    - content.action.view
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: amber
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: amber
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  icon:
    repo: fontawesome/brands/github
    edit: material/pencil
    view: material/eye

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

plugins:
  - search

extra_css:
  - css/extra.css

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/markburgess/SSTorytime
    - icon: fontawesome/brands/linkedin
      link: https://www.linkedin.com/groups/15875004/

nav:
  - Home: index.md
  - Getting Started:
      - Installation: GettingStarted.md
      - Tutorial: Tutorial.md
      - FAQ: FAQ.md
  - Concepts:
      - Knowledge & Learning: KnowledgeAndLearning.md
      - Storytelling: Storytelling.md
      - How Context Works: howdoescontextwork.md
      - Arrows & Relationships: arrows.md
      - Namespaces: namespaces.md
      - Outreach: outreach.md
  - N4L Language:
      - N4L Reference: N4L.md
      - Example Walkthrough: example.md
      - Dynamic Functions: dynamic_functions.md
  - Searching:
      - searchN4L: searchN4L.md
      - Search Examples: search_examples.md
      - pathsolve: pathsolve.md
  - Tools:
      - text2N4L: text2N4L.md
      - notes: notes.md
      - graph_report: graph_report.md
      - removeN4L: removeN4L.md
      - http_server: http_server.md
  - APIs:
      - Go API: API.md
      - Web API: WebAPI.md
  - Reference:
      - Debug: debug.md
      - To-Do: ToDo.md
      - Database:
          - Schema: Database/Schema.md
  - Contributing:
      - How to Contribute: howtocontribute.md
  - Project:
      - Documentation roadmap: plans/2026-04-20-documentation-upleveling.md
