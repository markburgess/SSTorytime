# AI image prompt manifest for SSTorytime documentation.
#
# Regeneration: rerun the prompt below against the nvidia-image-gen skill
# (Gemini 3 Pro image preview via NVIDIA LLM Gateway) to reproduce or refine
# an image consistently. Style prefixes are reused across many images —
# update them here and then regenerate the affected set.
#
# Post-processing: every generated PNG is downscaled to a 1200px long edge,
# re-encoded as JPEG at quality 85 with chroma subsampling 4:2:0, and
# stripped of metadata. Target size ≤ 240 KB. Use:
#
#   magick in.png -strip -resize '1200x1200>' -quality 85 \
#     -sampling-factor 4:2:0 out.jpg
#
# Source of the overall visual strategy:
# docs/plans/2026-04-20-documentation-upleveling.md (Phase 2).

styles:
  A_hand_drawn_academic: |
    Pen-and-ink technical diagram, white background, thin black lines,
    hand-drawn shading with cross-hatching. Academic journal style,
    1970s-1980s scientific illustration. Slight paper texture, no color
    except black and white. No caption or figure number.

  B_warm_retro_editorial: |
    Editorial illustration in warm earth tones (ochre, rust, cream, warm
    grey). Slightly retro 1970s-80s science textbook. Hand-stippling
    shading. Geometric but approachable. Focus on process and flow.
    No text overlay. No caption or figure number.

images:
  - id: I1
    file: figs/index_hero.jpg
    style: A
    placement: docs/index.md (top hero)
    last_regenerated: 2026-04-20
    alt: "Profile silhouette of a head on the left; a network of labeled concept nodes — NETWORK, IDEAS, CONTEXT, STORY, MEMORY, PERCEPTION — expands outward to the right like a cognitive map."
    prompt: |
      Pen-and-ink technical diagram, white background, thin black lines,
      hand-drawn shading with cross-hatching. Academic journal style,
      1970s-1980s scientific illustration. Slight paper texture, no color
      except black and white. Composition: profile silhouette of a person
      on the left rendered with dense cross-hatching; from their head, a
      luminous network of nodes and labelled arrows expands outward to
      the right, filling the frame. The network is soft, organic,
      suggestive of living thought. NODES ARE LABELED ONLY WITH THESE
      EXACT ENGLISH WORDS: NETWORK, IDEAS, CONTEXT, STORY, MEMORY,
      PERCEPTION. Labels must be spelled correctly in all caps. No other
      text or gibberish anywhere. No caption or figure number. Evocative
      without being precious.

  - id: I2
    file: figs/getting_started_hero.jpg
    style: B
    placement: docs/GettingStarted.md (hero)
    alt: "A command-line terminal on a wooden desk flanked by a PostgreSQL elephant and a Go gopher, connected by flow arrows."
    prompt: |
      A command-line terminal in the foreground rendered as a retro
      object on a wooden desk, with a stylized PostgreSQL elephant icon
      and Go gopher silhouette arranged on either side like companions.
      Process-flow arrows connect them. Warm ochre and rust palette.

  - id: I3
    file: figs/concepts_hero.jpg
    style: A
    placement: docs/KnowledgeAndLearning.md (hero)
    alt: "Multiple threads woven together and labeled context, chapter, arrow, story, node — a visual metaphor for how knowledge is a weaving of meaning."
    prompt: |
      Multiple hand-drawn threads converging at intersection points.
      Threads are labeled with small words: context, chapter, arrow,
      story, node. Cross-hatching shading. Suggests a weaving of
      meaning.

  - id: I4
    file: figs/n4l_hero.jpg
    style: A
    placement: docs/N4L.md (hero)
    last_regenerated: 2026-04-20
    alt: "Four-quadrant pen-and-ink grid showing the four STtypes: NEAR as mirror-twin figures, LEADSTO as a runner mid-stride, CONTAINS as a parent's embrace, EXPRESSES as an open mouth with speech bubble."
    prompt: |
      Pen-and-ink technical diagram, white background, thin black lines,
      hand-drawn shading with cross-hatching. Academic journal style,
      1970s-1980s scientific illustration. Slight paper texture, no color
      except black and white. Composition: four quadrants in a 2x2 grid,
      each showing one arrow personality: top-left, two human figures
      standing side-by-side in mirror symmetry labeled NEAR; top-right,
      a running figure mid-stride with a bold arrow labeled LEADSTO;
      bottom-left, a parent figure embracing a child labeled CONTAINS;
      bottom-right, an open mouth mid-word with a speech bubble labeled
      EXPRESSES. Thin grid lines separate the quadrants. All labels
      spelled correctly in clean all-caps serif. Ink cross-hatching
      throughout. No caption or figure number.
    notes: |
      Regenerated from Style B (warm retro) to Style A (pen-and-ink)
      2026-04-20 to match its sibling docs/figs/four_arrows.jpg. The
      four arrows are the project's deepest primitive; visual
      consistency between the N4L hero and the arrows grid is
      load-bearing.

